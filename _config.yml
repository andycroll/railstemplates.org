title: Rails Templates
description: A collection of simple Rails application templates ready to install via curl
url: "https://railstemplates.org"
baseurl: ""

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-sitemap

collections:
  templates:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: "templates"
    values:
      layout: "template"

sass:
  sass_dir: assets/css
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - bin/
  - assets/tailwind/
  - .agent-os/
