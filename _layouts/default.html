<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">{%- if site.env == 'production' -%}{% assign version = site.time | date: '%s' %}?v={{ version }}{% endif %}
  {%- feed_meta -%}
</head>

<body class="bg-gradient-to-br from-base-200 to-base-300 min-h-screen">
  <header class="py-8 px-4">
    <div class="max-w-6xl mx-auto">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/railstemplates-org-logo.svg' | relative_url }}" alt="{{ site.title }}" class="h-8 md:h-12">
      </a>
    </div>
  </header>

  <main class="flex-1">
    {{ content }}
  </main>

  <footer class="footer footer-center p-8 bg-base-100 text-base-content border-t border-base-300">
    <div class="text-center">
      <p class="font-semibold text-lg">{{ site.title | escape }}</p>
      <p class="text-base-content/70">{{ site.description | escape }}</p>
      <p class="text-sm text-base-content/50 mt-2">
        Built with Jekyll • Styled with DaisyUI
      </p>
    </div>
  </footer>
</body>

</html>
