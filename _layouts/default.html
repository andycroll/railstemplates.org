<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">{%- if site.env == 'production' -%}{% assign version = site.time | date: '%s' %}?v={{ version }}{% endif %}
  {%- feed_meta -%}
</head>

<body class="bg-gradient-to-br from-base-200 to-base-300 min-h-screen">
  <header>
    <div class="navbar bg-base-100 shadow-sm border-b border-base-300">
      <div class="navbar-start">
        <div class="dropdown lg:hidden">
          <div tabindex="0" role="button" class="btn btn-ghost">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </div>
          <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-lg md:text-xl font-bold text-primary" href="{{ '/' | relative_url }}">
          <span class="hidden sm:inline">{{ site.title | escape }}</span>
          <span class="sm:hidden">Rails Templates</span>
        </a>
      </div>
      <div class="navbar-end hidden lg:flex">
        <a class="btn btn-ghost" href="{{ '/' | relative_url }}">Home</a>
      </div>
    </div>
  </header>

  <main class="flex-1">
    {{ content }}
  </main>

  <footer class="footer footer-center p-8 bg-base-100 text-base-content border-t border-base-300">
    <div class="text-center">
      <p class="font-semibold text-lg">{{ site.title | escape }}</p>
      <p class="text-base-content/70">{{ site.description | escape }}</p>
      <p class="text-sm text-base-content/50 mt-2">
        Built with Jekyll • Styled with DaisyUI
      </p>
    </div>
  </footer>
</body>

</html>
