version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      patch-updates:
        applies-to: version-updates
        update-types:
          - "patch"
      minor-updates:
        applies-to: version-updates
        update-types:
          - "minor"
      security-patches:
        applies-to: security-updates
        update-types:
          - "patch"
          - "minor"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-updates:
        applies-to: version-updates
        update-types:
          - "patch"
      minor-updates:
        applies-to: version-updates
        update-types:
          - "minor"
      security-patches:
        applies-to: security-updates
        update-types:
          - "patch"
          - "minor"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
